<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // Destination
    const targetUrl = "https://apps.powerapps.com/play/e/df96c79d-f6d8-4b79-87d4-6fc4ff2d383f/a/44f3c9c1-1aed-4b93-9d07-1917019c6f7c?tenantId=9ed55846-8a81-4246-acd8-b1a01abfc0d1&source=portal&hideNavBar=true";

    // Detect user language (e.g., "en", "fr-CA", "fr")
    const lang = navigator.language.toLowerCase();

    // Localized messages
    const messages = {
      en: "Redirecting, please wait…",
      fr: "Redirection en cours, veuillez patienter…"
    };

    // Choose message
    const message =
      lang.startsWith("fr") ? messages.fr : messages.en;

    // Set text and redirect instantly
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("message").textContent = message;
      window.location.replace(targetUrl);
    });
  </script>
</head>
<body>
  <p id="message"></p>
</body>
</html>
